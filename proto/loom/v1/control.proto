syntax = "proto3";

package loom.v1;

import "google/protobuf/duration.proto";

option go_package = "github.com/bgrewell/loom/api/loomv1;loomv1";

// Wire-evolution discipline (ADR-0021): field numbers are never reused; a removed
// field's number and name go into `reserved`. Closed sets (e.g. roles) are enums,
// not bools, so they can grow. Authentication rides call metadata (ADR-0014), not
// a message field.

// FlowRole is what a configured flow does. UNSPECIFIED is treated as SENDER, so
// an unset role defaults to sending.
enum FlowRole {
  FLOW_ROLE_UNSPECIFIED = 0;
  FLOW_ROLE_SENDER = 1;
  FLOW_ROLE_RECEIVER = 2;  // binds an ephemeral port and drains+accounts inbound
  FLOW_ROLE_REFLECTOR = 3; // echoes received packets (not yet implemented)
  // Request/response pair for emulations that need real bidirectional traffic
  // (e.g. https-browse): the responder binds an ephemeral port and serves the
  // bytes a requester asks for; the requester drives the behavior script.
  FLOW_ROLE_RESPONDER = 4; // binds an ephemeral port, serves requested bytes
  FLOW_ROLE_REQUESTER = 5; // drives a script, requesting objects from a responder
  // Application pair for real protocol engines (core/app): the server binds an
  // ephemeral port (returned as ConfigureResponse.data_port) and runs the far
  // end of the app named in FlowSpec.app; the client drives that app toward it.
  FLOW_ROLE_APP_CLIENT = 6; // drives the named app's client engine at an app server
  FLOW_ROLE_APP_SERVER = 7; // binds an ephemeral port, runs the named app's server engine
}

// Control is the controller <-> agent control plane (DESIGN.md §8). It carries
// coordination only; telemetry streams back on StreamTelemetry, and traffic
// flows over the data plane, never these RPCs.
service Control {
  // Health reports liveness and version.
  rpc Health(HealthRequest) returns (HealthResponse);
  // Register enrolls an agent with a controller and returns a session id.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Capabilities reports the agent's available datapaths/generators/etc.
  rpc Capabilities(CapabilitiesRequest) returns (CapabilitiesResponse);
  // Configure prepares a flow and assigns its ephemeral data port.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);
  // Arm readies a configured flow to start (without sending yet).
  rpc Arm(ArmRequest) returns (ArmResponse);
  // Start begins a flow.
  rpc Start(StartRequest) returns (StartResponse);
  // Stop ends a flow.
  rpc Stop(StopRequest) returns (StopResponse);
  // Destroy tears a flow down and releases its resources.
  rpc Destroy(DestroyRequest) returns (DestroyResponse);
  // TimeSync performs one four-timestamp clock-sync exchange.
  rpc TimeSync(TimeSyncRequest) returns (TimeSyncResponse);
  // StreamTelemetry streams interval samples for a flow (or all flows).
  rpc StreamTelemetry(TelemetryRequest) returns (stream TelemetrySample);
}

message HealthRequest {}
message HealthResponse {
  string version = 1;     // human-readable build version
  bool ready = 2;
  uint32 api_version = 3; // control-plane wire version the agent speaks
}

message RegisterRequest {
  string agent_id = 1;
  string hostname = 2;
  repeated string tags = 3;
  uint32 api_version = 4; // wire version the controller speaks
}
message RegisterResponse {
  string session = 1;
}

message CapabilitiesRequest {}
message CapabilitiesResponse {
  repeated string datapaths = 1;
  repeated string generators = 2;
  repeated string schedulers = 3;
  repeated string payloads = 4;
  bool hardware_timestamps = 5;
  // Registered netpath network names (e.g. "host"). Consumers check networks
  // and apps at provision time and fail fast on version skew; all additions
  // are additive per ADR-0021, so mixed versions degrade to clean refusals.
  repeated string networks = 6;
  // Registered app names (e.g. "voip"), same skew-gate contract as networks.
  // This is the UNION of the client- and server-side registries, kept for
  // consumers predating the per-side lists below.
  repeated string apps = 7;
  // Per-side app registry names: what this agent can run as APP_CLIENT and as
  // APP_SERVER respectively. A slimmed build carrying only one side of an app
  // advertises it on that side only, so a controller refuses placing the
  // missing side at provision time instead of failing downstream at Configure.
  // Absent on agents predating these fields — consumers fall back to `apps`.
  repeated string apps_client = 8;
  repeated string apps_server = 9;
}

// FlowSpec describes one flow to run, mirroring `loom run` flags.
message FlowSpec {
  string generator = 1;
  string payload = 2;
  string datapath = 3;
  string target = 4; // host:port for udp/tcp
  uint32 packet_size = 5;
  string rate = 6; // e.g. "100Mbps"; empty = unlimited
  string iface = 7; // NIC name for the afxdp datapath
  uint32 queue = 8; // NIC queue for the afxdp datapath
  // emulation names an application-behavior emulation (e.g. "voip-call",
  // "https-browse"); empty = a raw flow. params are its tuning knobs.
  string emulation = 9;
  // Stop condition (whichever is reached first; all empty = until-stopped).
  google.protobuf.Duration duration = 10;
  uint64 count = 11;  // packets
  uint64 volume = 12; // bytes
  map<string, string> params = 13; // emulation parameters
  int64 seed = 14;                 // RNG seed for reproducible emulated shapes
  // transport carries request/response emulations (FLOW_ROLE_REQUESTER /
  // FLOW_ROLE_RESPONDER): "tcp" or "udp". Ignored by other roles, which use the
  // datapath field instead.
  string transport = 15;
  // app names the application protocol engine for FLOW_ROLE_APP_CLIENT /
  // FLOW_ROLE_APP_SERVER: "voip" | "http" | "video". Ignored by other roles.
  string app = 16;
  // network selects the netpath network the app's sockets are opened on;
  // "" = "host" (the OS network stack).
  string network = 17;
  // local is the local address to bind for datapath-backed networks (e.g. the
  // UE address on a gVisor netstack); "" lets the network choose.
  string local = 18;

  // role selects sender vs receiver (and, later, reflector). A receiver binds an
  // ephemeral UDP port returned as ConfigureResponse.data_port and
  // drains+accounts inbound packets instead of generating.
  FlowRole role = 21;

  reserved 20;        // was `bool listen` (replaced by role)
  reserved "listen";
}

message ConfigureRequest {
  FlowSpec flow = 1;
}
message ConfigureResponse {
  string flow_id = 1;
  uint32 data_port = 2; // ephemeral port the agent will listen/send on
}

message ArmRequest { string flow_id = 1; }
message ArmResponse {}
message StartRequest {
  string flow_id = 1;
  // start_at_unix_nanos schedules the flow to begin at an absolute time on the
  // agent's own clock (the controller translates a shared target time into each
  // agent's clock using the TimeSync offset, so flows on different hosts begin in
  // lockstep regardless of link latency). 0 (or a past time) starts immediately.
  int64 start_at_unix_nanos = 2;
  // report_interval_nanos is the reporting interval I. The agent emits one
  // telemetry sample per interval boundary at start_at + k*I (anchored to the
  // gate, or to first run when start_at is 0), each carrying that interval's
  // delta. 0 = legacy free-running cadence (back-compat with older controllers).
  int64 report_interval_nanos = 3;
}
message StartResponse {}
message StopRequest { string flow_id = 1; }
message StopResponse {}
message DestroyRequest { string flow_id = 1; }
message DestroyResponse {}

// TimeSync four-timestamp exchange: client stamps t1, server stamps t2 (recv)
// and t3 (send), client stamps t4 on receipt.
message TimeSyncRequest {
  int64 t1 = 1;
}
message TimeSyncResponse {
  int64 t1 = 1;
  int64 t2 = 2;
  int64 t3 = 3;
}

message TelemetryRequest {
  string flow_id = 1; // empty = all flows
}
message TelemetrySample {
  string flow_id = 1;
  int64 nanos = 2;           // agent timestamp of this reading (the boundary)
  uint64 bytes = 3;          // cumulative bytes
  uint64 packets = 4;        // cumulative packets
  double bits_per_sec = 5;   // legacy; the controller computes rate from the delta
  // Interval accounting, anchored to the scheduled-start gate. The agent reads
  // its counters at each boundary start_at + k*I and reports the interval's delta,
  // so the controller is a pure summer (no central rate clock).
  int64 interval_index = 6;    // k: 0 for [T,T+I], 1 for [T+I,T+2I], …; -1 on the final sample
  uint64 interval_bytes = 7;   // delta bytes during interval k
  uint64 interval_packets = 8; // delta packets during interval k
  int64 interval_nanos = 9;    // measured elapsed ns of interval k (rate = interval_bytes*8/interval_nanos)
  bool final = 10;             // true on the completion sample (trailing partial interval)
  TcpInfo tcp = 11;            // sender-side TCP_INFO diagnostics (nil for non-TCP datapaths)
  AppMetrics app = 12;         // app-layer quality metrics (nil for non-app flows)
}

// AppMetrics carries the per-interval quality metrics of an app flow
// (FLOW_ROLE_APP_CLIENT / FLOW_ROLE_APP_SERVER); the member set matches
// FlowSpec.app.
message AppMetrics {
  oneof kind {
    VoipMetrics voip = 1;
    HttpMetrics http = 2;
    VideoMetrics video = 3;
  }
}

// VoipMetrics is the RTP/RTCP receive-side quality snapshot: ITU-T G.107
// E-model scores plus the RFC 3550 statistics they were computed from.
//
// Interval vs cumulative: on boundary samples, loss_pct/discard_pct (and the
// mos_cq/r_factor scored from them) cover only the span since the previous
// boundary — the flow sampler pattern. On the FINAL telemetry sample they are
// scored over the whole call, so the end-of-run summary reflects whole-call
// quality rather than the trailing partial interval. rx_packets, lost, gaps,
// and jitter_ms are cumulative/current on every sample.
message VoipMetrics {
  double mos_cq = 1;      // conversational-quality MOS from r_factor
  double r_factor = 2;    // G.107 R
  double jitter_ms = 3;   // RFC 3550 A.8 interarrival jitter (current)
  double loss_pct = 4;    // network loss percentage (interval; whole-call on final)
  double discard_pct = 5; // jitter-buffer discard percentage (interval; whole-call on final)
  double burst_r = 6;     // Gilbert burst ratio (1.0 = random loss)
  double rtt_ms = 7;      // RFC 3550 §6.4.1 round-trip time
  double owd_ms = 8;      // one-way delay estimate
  double owd_err_ms = 9;  // owd error bound (owd.Tracker ErrBound)
  string owd_method = 10; // how owd was obtained (e.g. "timesync", "rtt/2")
  uint64 rx_packets = 11; // packets received, cumulative over the call
  uint64 lost = 12;       // packets lost, cumulative over the call (clamped at 0)
  repeated MediaGap gaps = 13; // loss/gap events, cumulative over the call
  double remote_mos_cq = 14;   // far end's MOS as reported via RTCP
  EModelBreakdown emodel = 15; // G.107 component breakdown behind r_factor
}

// EModelBreakdown exposes the ITU-T G.107 components so an R score is
// auditable: R = ro - is - idte - idle - idd - ie_eff (+ A, not carried).
message EModelBreakdown {
  double ro = 1;     // basic signal-to-noise ratio
  double is = 2;     // simultaneous impairment factor
  double idte = 3;   // talker echo delay impairment
  double idle = 4;   // listener echo delay impairment
  double idd = 5;    // too-long absolute delay impairment
  double ie_eff = 6; // effective equipment impairment (codec + loss)
}

// MediaGap is one contiguous loss/stall event in a media stream.
message MediaGap {
  int64 start_unix_nanos = 1;
  int64 end_unix_nanos = 2;
  uint32 packets_lost = 3;
}

// HttpMetrics is the requester-side HTTP/TLS quality snapshot.
message HttpMetrics {
  uint64 requests = 1;         // requests completed this interval
  uint64 errors = 2;           // failed requests this interval
  double ttfb_ms_p95 = 3;      // p95 time-to-first-byte
  double goodput_mbps = 4;     // application-payload throughput
  double tls_handshake_ms = 5; // TLS handshake latency
  double connect_ms = 6;       // TCP connect latency
}

// VideoMetrics is the player-side streaming QoE snapshot.
message VideoMetrics {
  uint64 stalls = 1;             // rebuffer events this interval
  double stall_time_ms = 2;      // total time stalled
  double rebuffer_ratio = 3;     // stall_time / (stall_time + play_time)
  double buffer_ms = 4;          // current buffer depth
  double avg_bitrate_kbps = 5;   // average selected bitrate
  double startup_ms = 6;         // time to first frame
  repeated MediaGap stall_events = 7; // individual stall intervals
}

// TcpInfo carries a snapshot of the sender socket's kernel TCP_INFO, for link
// profiling (is TCP entering a bad state?). Populated only for the TCP datapath
// on the sending side; zero/absent otherwise.
message TcpInfo {
  uint32 total_retrans = 1; // cumulative retransmitted segments
  uint32 lost = 2;          // segments currently considered lost
  uint32 rtt_us = 3;        // smoothed round-trip time (microseconds)
  uint32 rttvar_us = 4;     // round-trip time variance (microseconds)
  uint32 snd_cwnd = 5;      // congestion window (segments)
  uint32 snd_ssthresh = 6;  // slow-start threshold (segments)
}
