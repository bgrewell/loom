name: ci
on: [push, pull_request]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...

# DART integration suites (tests/*.yaml) run on the self-hosted testbed, where
# the (private) dart binary is preinstalled — not on GitHub-hosted runners, which
# can't fetch a private repo. Cloud CI above stays code-quality only
# (gofmt/vet/build/race). See docs/ci-cd.md.
