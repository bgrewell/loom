name: ci
on: [push, pull_request]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...

  integration-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # Install dart via the Go module proxy, NOT its install.sh: that script
      # calls the GitHub REST API (releases/latest), which is rate-limited to
      # 60/hr per IP and 403s intermittently from shared runner IPs. The proxy
      # path is unauthenticated-safe; GOTOOLCHAIN=auto handles dart's Go version.
      - name: install dart
        run: go install github.com/bgrewell/dart/cmd/dart@latest
      - name: dart suites
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          dart -c tests/smoke.yaml
          dart -c tests/single-host.yaml
